apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hallbooking-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: hallbooking.local
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
