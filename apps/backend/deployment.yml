apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hallbooking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: anurag117/nhsrc-backend:latest
        ports:
        - containerPort: 8081
        env:
            - name: SPRING_CONFIG_LOCATION
              value: file:/config/application.properties

        volumeMounts:
            - name: config
              mountPath: /config/application.properties
              subPath: application.properties
        
        resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      volumes:
        - name: config
          secret:
            secretName: backend-config